# Prefix on Ctrl-a (pressed as Caps+a)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Responsive defaults and predictable indexing.
set -sg escape-time 10
# Keep explicit window names; resurrect restores lose them if renaming is on
setw -g automatic-rename off
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1
set -g set-clipboard on
set -g mouse on

# True color
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-ghostty:RGB,*-256color:RGB"

# Extended key reporting (Pi needs Shift+Enter)
set -g extended-keys on
set -g extended-keys-format csi-u

set -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Resize: shift-HJKL mirrors the C-hjkl navigation directions, -r = repeatable
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Floating popups: g = lazygit, t = scratch shell
bind-key g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E lazygit
bind-key t display-popup -d "#{pane_current_path}" -w 75% -h 75% -E

# Session picker (sesh; binding verbatim from its README)
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Looks (status bar and border colors come from the tokyo-night theme plugin)
set -g status-position top
set -g popup-border-lines rounded

# Focus: dim inactive panes (tokyonight night bg vs storm bg).
# nvim paints its own bg, so vimade handles dimming inside nvim panes
# (its tint must stay in sync with this color).
set -g window-style 'bg=#1f2335'
set -g window-active-style 'bg=#24283b'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'christoomey/vim-tmux-navigator'

# Theme (must load before continuum: continuum injects its autosave hook
# into status-right, and the theme overwrites status-right wholesale)
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @tokyo-night-tmux_theme 'storm'

# Persistent sessions across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Plugin manager (must stay at the bottom)
set -g @plugin 'tmux-plugins/tpm'

# Auto-bootstrap TPM and install plugins on first launch.
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'mkdir -p ~/.config/tmux/plugins && git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'

# Pane chrome (after tpm: the theme sets border colors). Borderless: all
# lines blend into the dimmed bg and focus is shown by bg dimming alone.
# (An active-only border can't work — tmux paints the active pane's top
# line and its shared vertical edges with the same single style.)
set -g pane-border-style "fg=#1f2335,bg=#1f2335"
set -g pane-active-border-style "fg=#1f2335,bg=#1f2335"
set -g pane-border-indicators off
