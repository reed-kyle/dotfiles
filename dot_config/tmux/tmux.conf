# Prefix on Ctrl-a (pressed as Caps+a)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Responsive defaults and predictable indexing.
set -sg escape-time 10
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1
set -g set-clipboard on

# True color
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-ghostty:RGB,*-256color:RGB"

# Extended key reporting (Pi needs Shift+Enter)
set -g extended-keys on
set -g extended-keys-format csi-u

set -g mode-keys vi
bind-key u copy-mode -u
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'

# Persistent sessions across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Theme
set -g @plugin 'fabioluciano/tmux-tokyo-night'

# Plugin manager (must stay at the bottom)
set -g @plugin 'tmux-plugins/tpm'

# Auto-bootstrap TPM and install plugins on first launch.
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'mkdir -p ~/.config/tmux/plugins && git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
