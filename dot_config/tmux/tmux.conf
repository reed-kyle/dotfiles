# Prefix on Ctrl-a (pressed as Caps+a)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Responsive defaults and predictable indexing.
set -sg escape-time 10
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1
set -g set-clipboard on

# True color
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-ghostty:RGB,*-256color:RGB"

# Extended key reporting (Pi needs Shift+Enter)
set -g extended-keys on
set -g extended-keys-format csi-u

set -g mode-keys vi
bind-key u copy-mode -u
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Floating popups: g = lazygit, t = scratch shell
bind-key g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E lazygit
bind-key t display-popup -d "#{pane_current_path}" -w 75% -h 75% -E

# Looks (status bar and border colors come from the tokyo-night theme plugin)
set -g status-position top
set -g pane-border-lines single
set -g popup-border-lines rounded
set -g pane-border-status off

# Dim inactive panes so focus is obvious (active: storm bg, inactive: night bg)
# nvim runs with a transparent background so this applies to it too
set -g window-style "bg=#16161e"
set -g window-active-style "bg=#24283b"

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'

# Persistent sessions across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Theme
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @tokyo-night-tmux_theme 'storm'

# Plugin manager (must stay at the bottom)
set -g @plugin 'tmux-plugins/tpm'

# Auto-bootstrap TPM and install plugins on first launch.
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'mkdir -p ~/.config/tmux/plugins && git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
