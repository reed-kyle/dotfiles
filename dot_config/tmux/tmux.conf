# Prefix on Ctrl-a (pressed as Caps+a)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Auto-bootstrap TPM and install plugins on first tmux launch.
# Lives here (not in a chezmoi script) because install_plugins needs a
# running tmux server to read @plugin options.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Seamless pane navigation shared with Neovim splits
set -g @plugin 'christoomey/vim-tmux-navigator'

# Persistent sessions across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Plugin manager (must stay at the bottom)
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
